<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Olimpiada Colombiana de IA</title>
    <link rel="icon" type="image/png" href="logoIA.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-md p-8 rounded-2xl shadow-2xl">
        <div class="text-center mb-8">
            <img src="logoIA.png" alt="Logo IA" class="w-48 mx-auto mb-4">
            <h1 class="text-2xl font-bold text-slate-800">Olimpiada Colombiana de Inteligencia Artificial</h1>
	    <h2> Universidad Antonio Nariño </h2>
            <p class="text-slate-500 text-sm">Prueba Selectiva 2026</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" required 
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
                    placeholder="Ej. Juan Pérez">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Código del Colegio</label>
                <input type="text" id="codigo" name="codigo" required 
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
                    placeholder="Código asignado">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Clave Eduspace</label>
                <input type="password" id="clave" name="clave" required 
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
                    placeholder="••••••••">
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg">
                Ingresar a la Olimpiada
            </button>
        </form>

        <div id="errorMsg" class="mt-4 text-center text-red-500 text-sm hidden">
            Credenciales incorrectas. Por favor verifique.
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.classList.add('hidden');

            const formData = new FormData(this);
            
            // CAMBIA ESTA URL por tu dirección de PythonAnywhere
            fetch('https://emersonjleon.pythonanywhere.com/login', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    // Redirección con variables en la URL (Metadata)
                    window.location.href = data.redirect_url;
                } else {
                    errorDiv.classList.remove('hidden');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error de conexión con el servidor.');
            });
        });
    </script>
</body>
</html>
